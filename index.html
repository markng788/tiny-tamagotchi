<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiny Tamagotchi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Naming screen — shown only on first visit -->
  <div id="naming-screen">
    <h1>Tiny Tamagotchi</h1>
    <p id="naming-prompt">What will you name your pet?</p>
    <input id="name-input" type="text" maxlength="16" placeholder="Enter a name..." autocomplete="off" />
    <button id="btn-start">Start</button>
  </div>

  <!-- Game screen — hidden until name is set -->
  <div id="game-screen" class="hidden">
  <div id="app">
    <h1>Tiny Tamagotchi</h1>

    <!-- Pet name -->
    <p id="pet-name"></p>

    <!-- Pet display -->
    <div id="pet" class="state-normal">
      <div id="pet-face">
        <span id="pet-eyes">^ ^</span><br />
        <span id="pet-mouth">ω</span>
      </div>
    </div>

    <p id="state-message"></p>

    <!-- Stats -->
    <div id="stats">
      <div class="stat-row">
        <label>Hunger</label>
        <div class="bar-track">
          <div id="bar-hunger" class="bar-fill"></div>
        </div>
        <span id="val-hunger" class="stat-value">80</span>
      </div>

      <div class="stat-row">
        <label>Happiness</label>
        <div class="bar-track">
          <div id="bar-happiness" class="bar-fill"></div>
        </div>
        <span id="val-happiness" class="stat-value">80</span>
      </div>

      <div class="stat-row">
        <label>Energy</label>
        <div class="bar-track">
          <div id="bar-energy" class="bar-fill"></div>
        </div>
        <span id="val-energy" class="stat-value">80</span>
      </div>
    </div>

    <!-- Actions -->
    <div id="actions">
      <button id="btn-feed">Feed</button>
      <button id="btn-play">Play</button>
      <button id="btn-rest">Rest</button>
    </div>

    <!-- Reset -->
    <button id="btn-reset">Reset</button>
  </div>
  </div><!-- /game-screen -->

  <script src="app.js"></script>
</body>
</html>
